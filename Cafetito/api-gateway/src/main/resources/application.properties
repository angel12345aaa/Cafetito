server.port=8090

spring.application.name=api-gateway
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

spring.cloud.gateway.routes[0].id=login-service
spring.cloud.gateway.routes[0].uri=http://login-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=agricultor-service
spring.cloud.gateway.routes[1].uri=http://agricultor-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/agricultor/**

spring.cloud.gateway.routes[2].id=beneficio-cuentas
spring.cloud.gateway.routes[2].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cuentas/**

spring.cloud.gateway.routes[3].id=beneficio-parcialidades
spring.cloud.gateway.routes[3].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/parcialidades/**

spring.cloud.gateway.routes[4].id=beneficio-peso-cabal
spring.cloud.gateway.routes[4].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/peso-cabal/**

spring.cloud.gateway.routes[5].id=beneficio-historial
spring.cloud.gateway.routes[5].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/historial/**

spring.cloud.gateway.routes[6].id=beneficio-bitacora
spring.cloud.gateway.routes[6].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/bitacora/**

spring.cloud.gateway.routes[7].id=beneficio-catalogos
spring.cloud.gateway.routes[7].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/catalogos/**

spring.cloud.gateway.routes[8].id=beneficio-transitos
spring.cloud.gateway.routes[8].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/transitos/**

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true