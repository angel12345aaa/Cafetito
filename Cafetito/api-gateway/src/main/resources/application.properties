server.port=8090

spring.application.name=api-gateway
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

spring.cloud.gateway.routes[0].id=login-service
spring.cloud.gateway.routes[0].uri=http://login-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=beneficio-cuentas
spring.cloud.gateway.routes[1].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cuentas/**

spring.cloud.gateway.routes[2].id=beneficio-service
spring.cloud.gateway.routes[2].uri=http://beneficio-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/beneficio/**

spring.cloud.gateway.routes[3].id=agricultor-service
spring.cloud.gateway.routes[3].uri=http://agricultor-service:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/agricultor/**

spring.cloud.gateway.routes[4].id=pesocabal-service
spring.cloud.gateway.routes[4].uri=http://pesocabal-service:8084
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/pesocabal/**

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true