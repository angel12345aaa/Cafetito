<div class="container-fluid py-4"><h2 class="fw-bold mb-4">Agricultores</h2>
  <div class="card shadow-sm"><div class="card-body p-0">
    <table class="table table-hover mb-0"><thead class="table-success">
      <tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Teléfono</th></tr>
    </thead><tbody>
      <tr *ngFor="let a of agricultores"><td>{{a.id}}</td><td>{{a.nombre}}</td><td>{{a.apellido}}</td><td>{{a.telefono}}</td></tr>
      <tr *ngIf="!loading && agricultores.length===0"><td colspan="4" class="text-center text-muted py-3">Sin registros</td></tr>
    </tbody></table></div></div></div>
