<div class="container-fluid py-4"><h2 class="fw-bold mb-4">Transportes</h2>
  <div class="card shadow-sm"><div class="card-body p-0">
    <table class="table table-hover mb-0"><thead class="table-success">
      <tr><th>Placa</th><th>Marca</th><th>Agricultor</th><th>Estado</th><th>Accion</th></tr>
    </thead><tbody>
      <tr *ngFor="let t of transportes"><td>{{t.placa}}</td><td>{{t.marca}}</td><td>{{t.agricultor?.nombre}}</td><td><span class="badge bg-success">{{t.estado}}</span></td>
      <tr *ngIf="!loading && transportes.length===0"><td colspan="5" class="text-center text-muted py-3">Sin registros</td></tr>
    </tbody></table></div></div></div>
