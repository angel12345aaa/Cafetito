<div class="dashboard-container">
  <h1>Panel del Agricultor</h1>
  <p>
    Bienvenido al módulo de agricultor. Desde aquí puedes gestionar tus procesos principales.
  </p>

  <div class="cards">

    <div class="card" (click)="irPesajes()">
      <h2>Pesajes</h2>
      <p>Crear y consultar pesajes.</p>
    </div>

    <div class="card" (click)="irTransportes()">
      <h2>Transportes</h2>
      <p>Registrar y administrar vehículos.</p>
    </div>

    <div class="card" (click)="irTransportistas()">
      <h2>Transportistas</h2>
      <p>Registrar y administrar pilotos.</p>
    </div>

  </div>
</div>
